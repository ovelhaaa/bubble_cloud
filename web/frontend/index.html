<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Bubbles Editor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Alpine.js for lightweight, reactive state management without a build step -->
    <script defer src="app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="editorApp()">
    <header class="top-bar">
        <h1>Sound Bubbles</h1>
        <div class="status-bar">
            <span class="status-badge" :class="isDraft ? 'draft' : 'baseline'" x-text="isDraft ? 'Local Draft' : 'Baseline Defaults'"></span>
            <button @click="resetToBaseline()" class="btn-reset">Reset</button>
        </div>
    </header>

    <main class="content">
        <section class="audio-control-panel">
            <h2>Web Audio Preview</h2>
            <div class="audio-controls">
                <button class="btn btn-primary" @click="initAudio()" x-show="!audioInitialized">Start Audio</button>
                <div x-show="audioInitialized">
                    <button class="btn" :class="isPlaying ? 'btn-danger' : 'btn-primary'" @click="togglePlayback()" x-text="isPlaying ? 'Stop' : 'Play Test Signal'"></button>
                    <div class="audio-status" style="margin-top: 10px;">
                        <p>Status: <span x-text="audioStateText"></span></p>
                        <p style="font-size: 0.8em; color: #666;">Note: Audio processing runs in browser via WASM</p>
                    </div>
                </div>
            </div>

            <div class="metrics-panel" x-show="audioInitialized" style="margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 4px;">
                <h3>DSP Internal Metrics</h3>
                <p>Envelope: <span x-text="metrics.envelope.toFixed(4)"></span></p>
                <p>State: <span x-text="getEngineStateName(metrics.state)"></span></p>
                <p>Active Voices: <span x-text="metrics.voices"></span> / 12</p>
            </div>
        </section>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

        <p class="helper-text">
            Adjust parameters below. The audio preview updates in real-time. You can also copy or download the flat JSON preset.
        </p>

        <!-- Dynamic Accordion Groups -->
        <template x-for="group in parameterGroups" :key="group.name">
            <div class="accordion">
                <button
                    class="accordion-header"
                    @click="toggleAccordion(group.name)"
                    :aria-expanded="openAccordion === group.name"
                >
                    <span x-text="group.name"></span>
                    <span class="chevron" x-show="openAccordion !== group.name">▼</span>
                    <span class="chevron" x-show="openAccordion === group.name">▲</span>
                </button>

                <div class="accordion-content" x-show="openAccordion === group.name">
                    <template x-for="paramKey in group.params" :key="paramKey">
                        <div class="param-row">
                            <div class="param-labels">
                                <label :for="paramKey" x-text="formatLabel(paramKey)"></label>
                                <!-- Numeric Input for precise mobile entry -->
                                <input
                                    type="number"
                                    :id="paramKey + '_num'"
                                    x-model.number="params[paramKey]"
                                    @input="saveDraft()"
                                    :step="getParamConfig(paramKey).step"
                                    :min="getParamConfig(paramKey).min"
                                    :max="getParamConfig(paramKey).max"
                                    class="num-input"
                                >
                            </div>
                            <!-- Thick touch-friendly slider -->
                            <input
                                type="range"
                                :id="paramKey"
                                x-model.number="params[paramKey]"
                                @input="saveDraft()"
                                :step="getParamConfig(paramKey).step"
                                :min="getParamConfig(paramKey).min"
                                :max="getParamConfig(paramKey).max"
                                class="slider"
                            >
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Spacer to ensure bottom accordions aren't hidden by the fixed footer -->
        <div class="bottom-spacer"></div>
    </main>

    <footer class="sticky-footer">
      <div class="footer-actions">
        <button id="copyJsonBtn" class="btn btn-primary" type="button">Copy JSON</button>
        <button id="downloadJsonBtn" class="btn btn-secondary" type="button">Download JSON</button>
      </div>
      <a
        class="btn btn-link"
        href="https://github.com/REPLACE_ME_ORG/REPLACE_ME_REPO/actions"
        target="_blank"
        rel="noreferrer"
      >
        Open GitHub Actions
      </a>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
