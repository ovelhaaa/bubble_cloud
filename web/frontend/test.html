<!DOCTYPE html>
<html><body>
<script>
async function test() {
    console.log("Creating AudioContext...");
    const audioCtx = new window.AudioContext();
    console.log("Adding module worklet.js...");
    try {
        await audioCtx.audioWorklet.addModule('bubble_cloud_wasm.js');
        await audioCtx.audioWorklet.addModule('worklet.js');
        console.log("Module added, creating node...");
        const node = new AudioWorkletNode(audioCtx, 'sound-bubbles-worklet');
        console.log("Node created:", node);
    } catch(e) {
        console.error("Failed:", e);
    }
}
test();
</script>
</body></html>
