name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'core/**'
      - 'web/wasm/**'
      - 'Makefile'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM
        run: make wasm

      - name: Verify generated artifacts
        run: |
          test -f web/frontend/bubble_cloud_wasm.js || (echo "ERROR: bubble_cloud_wasm.js missing" && false)

      - name: Prepare distribution directory
        run: |
          mkdir dist
          cp -r web/frontend/* dist/
          touch dist/.nojekyll

          echo "Verified dist contents:"
          ls -lah dist
          test -f dist/index.html || (echo "ERROR: dist/index.html is missing" && false)
          test -f dist/bubble_cloud_wasm.js || (echo "ERROR: dist/bubble_cloud_wasm.js is missing" && false)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
