name: Render Current Preset

on:
  workflow_dispatch:
    inputs:
      preset_file:
        description: 'Preset JSON file path'
        required: false
        default: 'presets/current.json'
        type: string
      input_file:
        description: 'Input WAV file path'
        required: false
        default: 'sample/test_in.wav'
        type: string
  push:
    paths:
      - 'sound_bubbles_dsp.c'
      - 'sound_bubbles_dsp.h'
      - 'sound_bubbles_render.c'
      - 'presets/current.json'
      - '.github/workflows/render_current.yml'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Paths
        run: |
          PRESET_FILE="${{ github.event.inputs.preset_file }}"
          INPUT_FILE="${{ github.event.inputs.input_file }}"

          if [ -z "$PRESET_FILE" ]; then
            PRESET_FILE="presets/current.json"
          fi

          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE="sample/test_in.wav"
          fi

          echo "preset_file=$PRESET_FILE" >> "$GITHUB_ENV"
          echo "input_file=$INPUT_FILE" >> "$GITHUB_ENV"

      - name: Verify Required Files
        run: |
          echo "Checking for required files..."
          ls -l sound_bubbles_render.c sound_bubbles_dsp.c sound_bubbles_dsp.h

          echo "Checking input file: $input_file"
          if [ ! -f "$input_file" ]; then
            echo "Error: Input file '$input_file' not found!"
            exit 1
          fi

          echo "Checking preset file: $preset_file"
          if [ ! -f "$preset_file" ]; then
            echo "Error: Preset file '$preset_file' not found!"
            exit 1
          fi

      - name: Compile Offline Renderer
        run: |
          gcc sound_bubbles_render.c sound_bubbles_dsp.c -O2 -Wall -Wextra -std=c11 -lm -o sound_bubbles_render

      - name: Run Renderer
        run: |
          ./sound_bubbles_render "$input_file" "$preset_file" output.wav

      - name: Verify Output
        run: |
          if [ ! -f output.wav ]; then
            echo "Error: output.wav was not generated!"
            exit 1
          fi
          ls -lh output.wav

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-current-${{ github.run_id }}
          path: output.wav
